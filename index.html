types.forEach(t=>{
const b=document.createElement("button");

b.onclick=()=>{af=t;fb.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");render()};

function render(){
const list=document.getElementById("rlist");
const fl=af==="全部"?R:R.filter(r=>r.report_type===af);
list.innerHTML=fl.map(r=>{
const d=new Date(r.report_date).toLocaleDateString("zh-CN");
const bc="badge-"+r.report_type;
const ks=(typeof r.key_stocks==="string"?r.key_stocks.split(",").filter(s=>s.trim()):[]);
const ct=r.content||"";
return`<div class="report-card" onclick="this.classList.toggle('open')">

</div>`}).join("")}
